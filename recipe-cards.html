<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>This week's dinners</title>

<style>
  :root{
    --paper:#f6f3ec;
    --card:#fffdf8;
    --ink:#22251f;
    --ink-soft:#5b6157;
    --line:#e4dfd2;
    --green:#2f7d52;
    --green-deep:#23613f;
    --green-wash:#e9f1ea;
    --blue:#2b62b0;
    --blue-wash:#e7eef9;
    --amber:#c97f1c;
    --amber-wash:#faefdb;
    --salmon:#d98a6f;
    --done:#9aa194;
    --radius:18px;
    --shadow:0 1px 2px rgba(34,37,31,.05), 0 8px 24px rgba(34,37,31,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:680px;margin:0 auto;padding:20px 16px 64px;}

  /* top nav */
  .topnav{display:flex;gap:6px;margin-bottom:20px;background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:5px;}
  .topbtn{flex:1;border:none;background:none;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:14px;font-weight:600;color:var(--ink-soft);padding:10px 14px;border-radius:11px;cursor:pointer;transition:.15s;}
  .topbtn.active{background:var(--green);color:#fff;}
  .topbtn:not(.active):hover{background:var(--paper);}

  /* selector */
  .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin:2px 0 10px;}
  .selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;}
  .mealbtn{
    text-align:left;background:var(--card);border:1.5px solid var(--line);
    border-radius:14px;padding:12px 13px;cursor:pointer;transition:.15s;font-family:inherit;
  }
  .mealbtn:hover{border-color:#cdc6b5;}
  .mealbtn.active{border-color:var(--green);background:var(--green-wash);}
  .mealbtn .mtitle{font-family:Georgia,serif;font-weight:600;font-size:15px;line-height:1.2;color:var(--ink);}
  .mealbtn .mmeta{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .mealbtn .tagrow{margin-top:7px;}
  .pill{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:20px;background:#efece2;color:var(--ink-soft);margin-right:4px;}
  .pill.fish{background:#fdeee8;color:#b15c3c;}
  .pill.lunch{background:#eef3df;color:#5e7a1f;}

  /* card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .head{padding:20px 20px 18px;border-bottom:1px solid var(--line);}
  .title{font-family:Georgia,serif;font-weight:600;font-size:25px;line-height:1.12;margin:0 0 4px;letter-spacing:-.01em;}
  .sub{color:var(--ink-soft);font-size:13.5px;margin:0 0 16px;}
  .macros{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
  .macro{background:var(--paper);border-radius:12px;padding:9px 4px;text-align:center;}
  .macro b{display:block;font-family:Georgia,serif;font-size:18px;font-weight:600;line-height:1;}
  .macro span{display:block;font-size:10.5px;color:var(--ink-soft);margin-top:3px;text-transform:uppercase;letter-spacing:.05em;}
  .macro.hero b{color:var(--green-deep);}
  .meta{display:flex;gap:18px;font-size:12.5px;color:var(--ink-soft);flex-wrap:wrap;}
  .meta b{color:var(--ink);font-weight:600;}
  .note{margin-top:14px;background:#fdeee8;border:1px solid #f3d6c8;border-radius:12px;padding:10px 12px;font-size:12.5px;color:#8a4a30;}
  .note b{color:#7a3c24;}

  /* tabs */
  .tabs{display:flex;gap:4px;padding:12px 14px 0;background:var(--card);}
  .tab{flex:1;border:none;background:none;font-family:inherit;font-size:14px;font-weight:600;color:var(--ink-soft);padding:10px;cursor:pointer;border-radius:10px 10px 0 0;border-bottom:2.5px solid transparent;transition:.15s;}
  .tab.active{color:var(--green-deep);border-bottom-color:var(--green);background:var(--green-wash);}
  .panel{padding:18px 20px 22px;}

  /* ingredients */
  .sech{font-family:Georgia,serif;font-weight:600;font-size:16px;margin:0 0 10px;display:flex;align-items:center;gap:8px;}
  .sech::before{content:"";width:5px;height:18px;border-radius:3px;background:var(--green);display:inline-block;}
  .prep{list-style:none;padding:0;margin:0 0 22px;}
  .prep li{position:relative;padding:0 0 11px 22px;font-size:13.5px;color:var(--ink);line-height:1.5;}
  .prep li::before{content:"";position:absolute;left:4px;top:8px;width:6px;height:6px;border-radius:50%;background:var(--amber);}
  .prep li:last-child{padding-bottom:0;}
  .ing{list-style:none;padding:0;margin:0;}
  .ing li{display:flex;align-items:flex-start;gap:11px;padding:11px 2px;border-bottom:1px solid var(--line);cursor:pointer;font-size:14px;}
  .ing li:last-child{border-bottom:none;}
  .box{flex-shrink:0;width:20px;height:20px;border:2px solid #c9c2b1;border-radius:6px;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.12s;}
  .ing li.checked .box{background:var(--green);border-color:var(--green);}
  .box svg{width:12px;height:12px;opacity:0;transition:.12s;}
  .ing li.checked .box svg{opacity:1;}
  .ing li.checked .iname{color:var(--done);text-decoration:line-through;}
  .iname{transition:.12s;}
  .iqty{margin-left:auto;color:var(--ink-soft);font-size:13px;font-variant-numeric:tabular-nums;flex-shrink:0;padding-left:10px;}
  .ing li.checked .iqty{color:#c2c8bb;}

  /* cook mode */
  .progwrap{margin-bottom:18px;}
  .progmeta{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-bottom:7px;font-weight:600;}
  .progbar{height:7px;background:#e9e4d7;border-radius:10px;overflow:hidden;}
  .progfill{height:100%;background:var(--green);border-radius:10px;transition:width .35s ease;}
  .step{border:1.5px solid var(--line);border-radius:14px;padding:15px 15px 16px;margin-bottom:12px;background:var(--card);transition:.3s;}
  .step.active{border-color:var(--green);box-shadow:var(--shadow);}
  .step.future{opacity:.5;}
  .step.done{opacity:.55;background:var(--paper);}
  .stephd{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .stepnum{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:#e9e4d7;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:Georgia,serif;}
  .step.active .stepnum{background:var(--green);color:#fff;}
  .step.done .stepnum{background:var(--done);color:#fff;}
  .steptag{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);}
  .step.active .steptag{color:var(--green-deep);}
  .donetick{margin-left:auto;color:var(--done);font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;}
  .steptext{font-size:14.5px;line-height:1.5;}
  .tip{margin-top:11px;background:var(--amber-wash);border-radius:10px;padding:9px 11px;font-size:12.5px;color:#8a5b14;display:flex;gap:7px;}
  .tip svg{flex-shrink:0;margin-top:1px;}

  /* timer */
  /* parallel */
  .par-banner{background:var(--blue-wash);border:1px solid #c3d4ee;border-radius:10px;padding:9px 12px;font-size:12.5px;color:var(--blue);font-weight:600;margin-bottom:12px;display:flex;gap:7px;align-items:center;}
  .par-grid{display:grid;gap:10px;}
  .par-col{border-radius:12px;padding:13px;border:1.5px solid;}
  .par-col.main{background:var(--blue-wash);border-color:#bcd0ee;}
  .par-col.side{background:var(--amber-wash);border-color:#ecd9b3;}
  .par-label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;}
  .par-col.main .par-label{color:var(--blue);}
  .par-col.side .par-label{color:var(--amber);}
  .par-text{font-size:13.5px;line-height:1.45;}

  /* nav */
  .nav{display:flex;gap:10px;margin-top:18px;}
  .nbtn{flex:1;border-radius:12px;padding:14px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;border:none;transition:.12s;}
  .nbtn.back{flex:0 0 84px;background:#e9e4d7;color:var(--ink);}
  .nbtn.back:hover{background:#ddd6c5;}
  .nbtn.back:disabled{opacity:.4;cursor:not-allowed;}
  .nbtn.next{background:var(--green);color:#fff;}
  .nbtn.next:hover{background:var(--green-deep);}

  /* finish */
  .finish{text-align:center;padding:34px 18px;}
  .finish .big{font-size:46px;margin-bottom:6px;}
  .finish h3{font-family:Georgia,serif;font-size:24px;font-weight:600;margin:0 0 6px;}
  .finish p{color:var(--ink-soft);font-size:14px;margin:0 0 22px;}
  .finish button{background:var(--green);color:#fff;border:none;border-radius:12px;padding:13px 26px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;}
  .finish button:hover{background:var(--green-deep);}

  /* shopping list */
  .iqty{text-align:right;line-height:1.3;}
  .ing .iqty b{color:var(--ink);font-weight:700;}
  .ing li.checked .iqty b{color:#c2c8bb;}
  .ifor{display:block;font-size:11.5px;color:var(--ink-soft);font-weight:400;margin-top:2px;}
  .ing li.checked .ifor{color:#c2c8bb;}
  .ov{display:inline-block;font-size:10px;font-weight:700;background:var(--amber-wash);color:var(--amber);padding:1px 6px;border-radius:10px;margin-left:6px;vertical-align:middle;}
  .shop-top{display:flex;justify-content:space-between;align-items:center;background:var(--green-wash);border:1px solid #bcdcc6;border-radius:14px;padding:14px 16px;margin-bottom:20px;}
  .shop-total{font-family:Georgia,serif;font-size:30px;font-weight:600;color:var(--green-deep);line-height:1;}
  .shop-sub{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .shop-beat{text-align:right;font-size:11.5px;color:var(--ink-soft);line-height:1.35;}
  .shop-beat b{font-family:Georgia,serif;font-size:16px;color:var(--ink);}
  .shop-note{font-size:12.5px;color:var(--ink-soft);margin:-2px 0 12px;}
  .pantry{list-style:none;padding:0;margin:0;}
  .pantry li{display:flex;align-items:center;gap:11px;padding:11px 2px;border-bottom:1px solid var(--line);}
  .pantry li:last-child{border-bottom:none;}
  .pname{font-size:14px;flex:1;}
  .pnote{display:block;font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
  .pstock{display:flex;border:1.5px solid var(--line);border-radius:20px;overflow:hidden;flex-shrink:0;}
  .pstock button{border:none;background:none;font-family:inherit;font-size:11px;font-weight:700;padding:5px 9px;cursor:pointer;color:var(--ink-soft);transition:.12s;white-space:nowrap;}
  .pstock button.active-in{background:var(--green);color:#fff;}
  .pstock button.active-low{background:var(--amber);color:#fff;}
  .pstock button.active-buy{background:#c0392b;color:#fff;}
  .pantry li.needs-buy .pname{color:var(--ink);}
  .pantry li.needs-buy .pnote{color:var(--ink-soft);}
  .pantry-buy-row{display:flex;align-items:flex-start;gap:11px;padding:11px 2px;border-bottom:1px solid var(--line);cursor:pointer;}
  .pantry-buy-row:last-child{border-bottom:none;}

  .footnote{text-align:center;font-size:11.5px;color:#a8a293;margin-top:20px;}
</style>
</head>
<body>
<div class="wrap">
  <div id="wrap-inner"></div>
  <div class="footnote">Calorie and protein figures are estimates. Worth a sanity-check with your nutritionist on the saturated-fat side.</div>
</div>

<script>
const RECIPES = [
  {
    id:"salmon", title:"Miso salmon, sesame greens & rice",
    sub:"Sweet-savoury glaze, garlicky greens, fluffy rice. Cook the salmon fresh each night.",
    tag:"fish", tagLabel:"Oily fish",
    kcal:575, protein:41, carbs:48, fat:24, prep:"15 min", cook:"18 min", cost:"£2.80",
    note:"Salmon reheats badly (rubbery, fishy). Cook the rice and greens for both nights, but pan-cook one fillet fresh on Monday and the second fresh on Tuesday. It only takes 8 minutes.",
    prepSteps:[
      "Make the glaze: in a small bowl stir together 2 tbsp white miso paste, 2 tsp honey, 1 tbsp soy sauce and 1 tsp toasted sesame oil until smooth and glossy, like a thick paint. Set aside.",
      "Pat both salmon fillets dry all over with kitchen paper. Wet fish steams instead of crisping. Sprinkle the skin of each with a small pinch of salt.",
      "Tip 100g rice into a sieve and rinse under the cold tap for about 20 seconds until the water runs clear, not cloudy. This rinses off surface starch so it won't turn gluey.",
      "Cut the broccoli into bite-size florets. Cut the pak choi in half lengthways straight through the root so each half stays held together.",
      "Peel and finely slice 2 garlic cloves.",
      "Measure 150g frozen edamame into a bowl. No need to defrost."
    ],
    ingredients:[
      {n:"Salmon fillets, skin on (about 130g each)", q:"2"},
      {n:"White basmati or jasmine rice", q:"100g"},
      {n:"Tenderstem or regular broccoli", q:"160g"},
      {n:"Pak choi", q:"2"},
      {n:"Frozen edamame (soya beans)", q:"150g"},
      {n:"White (shiro) miso paste", q:"2 tbsp"},
      {n:"Honey", q:"2 tsp"},
      {n:"Soy sauce", q:"1 tbsp"},
      {n:"Toasted sesame oil", q:"2 tsp"},
      {n:"Garlic cloves", q:"2"},
      {n:"Sesame seeds", q:"2 tsp"},
      {n:"Salt", q:"pinch"}
    ],
    steps:[
      {text:"Start the rice. Tip the rinsed rice into a small pan with 200ml cold water and a small pinch of salt. Bring to a fast boil (big rolling bubbles), then drop to the lowest heat and put the lid on tight. Set a timer for 12 minutes and move straight to the next step — the salmon and greens cook while the rice steams.", tip:"Low heat and a tight lid is everything. Bubbling too hard burns the bottom before the top has cooked. Don't lift the lid, the trapped steam is what cooks the grains.", timer:720},
      {parallel:{
        main:{text:"Cook the salmon skin-side down. Heat a dry non-stick frying pan on medium for 1 minute. Lay one fillet in skin-side down and press it flat with a fish slice for 10 seconds so the whole skin meets the pan. Leave it completely alone for 5 minutes. You'll know it's ready to flip when the flesh has turned pale pink two-thirds of the way up the side — you can see this from the edge of the fillet without touching it.", tip:"Medium, not high. Salmon skin catches and burns fast on high heat. It should sizzle gently, not crackle and spit.", timer:300},
        side:{text:"Steam the greens. In a second pan bring 2cm of water and a pinch of salt to the boil. Add the broccoli and the frozen edamame. Cook for 4 minutes.", tip:"Broccoli is ready when a fork slides in with a little resistance and it's still bright green, never grey and soft.", timer:240}
      }},
      {text:"Flip and glaze the salmon. Use a fish slice to turn the fillet over onto its flesh side. Spoon the miso glaze you made earlier over the top of the fillet, covering it evenly. Cook for 2 more minutes. The salmon is done when it flakes apart easily under light pressure from a fork and looks opaque all the way through, not glassy or translucent.", tip:"Don't press down on the salmon while it cooks flesh-side down — you'll squeeze out the moisture. Just let it sit.", timer:120},
      {text:"Dress the greens. Drop the halved pak choi into the greens pan for the last 1 minute, just until the leaves wilt and the stems turn tender. Drain everything well, then toss with 1 tsp sesame oil, the sliced raw garlic, and a squeeze of the leftover zested lemon half.", tip:"Tossing the garlic in raw and warm off the heat keeps it sharp and fresh without the bitterness of burnt garlic. The lemon juice lifts the whole dish without overpowering the miso glaze.", timer:null},
      {text:"Plate up. Spoon the rice into a bowl, pile the greens alongside and sit the salmon on top. Drizzle over the last of the glaze and scatter with 1 tsp sesame seeds.", tip:"Per serving: about 41g protein, 575 kcal.", timer:null}
    ]
  },
  {
    id:"chicken", title:"Chicken, lentil & spinach one-pan",
    sub:"Seared thighs braised with green lentils, tomato and a mountain of spinach. Reheats better than it cooks.",
    tag:"", tagLabel:"Iron-rich",
    kcal:555, protein:46, carbs:40, fat:20, prep:"10 min", cook:"22 min", cost:"£2.40",
    note:"This one is built for leftovers. The flavour deepens overnight, so Tuesday's portion is arguably the better one. Reheat gently in a pan or microwave until piping hot through.",
    prepSteps:[
      "Pat the chicken thighs dry with kitchen paper, then sprinkle both sides with a generous pinch of salt, about half a teaspoon spread across all four. Salt now rather than later: it seasons the meat all the way through and helps it brown. Dry chicken browns, wet chicken steams.",
      "Peel and finely chop 1 onion. Peel and finely chop 3 garlic cloves.",
      "Drain the tin of lentils in a sieve and rinse under the cold tap for 10 seconds to wash off the cloudy storage liquid.",
      "Dissolve half a stock cube in 100ml just-boiled water and stir until there are no lumps left.",
      "If using frozen spinach, tip 150g into a bowl now to start softening. No need to fully defrost."
    ],
    ingredients:[
      {n:"Skinless boneless chicken thighs", q:"4 (≈320g)"},
      {n:"Tinned green or puy lentils", q:"1 × 400g"},
      {n:"Brown or white onion", q:"1"},
      {n:"Garlic cloves", q:"3"},
      {n:"Tinned chopped tomatoes", q:"1 × 400g"},
      {n:"Spinach (frozen or fresh)", q:"150g"},
      {n:"Olive oil", q:"1 tbsp"},
      {n:"Mixed dried herbs", q:"1 tsp"},
      {n:"Chicken stock cube", q:"½"},
      {n:"Salt", q:"≈1 tsp"}
    ],
    steps:[
      {text:"Brown the chicken. Heat 1 tbsp olive oil in a wide pan on medium-high for 1 minute until it looks shimmery and runs thin when you tilt the pan. Lay the thighs in and don't move them for 5 minutes.", tip:"Leave them completely alone. That golden-brown crust is pure flavour and it only forms if the meat sits still. If a piece sticks when you try to lift it, it isn't ready to turn yet.", timer:300},
      {text:"Turn and brown the other side. Lift an edge: the underside should be deep golden brown. Flip each piece and brown the second side for 4 minutes, then lift the chicken onto a plate for now. Leave the pan as it is.", tip:"Don't clean the pan. Those brown bits stuck to the base are flavour you'll lift back into the sauce in a moment.", timer:240},
      {text:"Soften the onion and garlic. Drop the heat to medium. Add the chopped onion with a small pinch of salt and cook, stirring, for about 4 minutes until soft and translucent (see-through, not browned). Add the garlic for the last 30 seconds.", tip:"Garlic burns in under a minute and turns bitter, so it always goes in last, once the onion has softened.", timer:240},
      {text:"Build the sauce. Pour in the chopped tomatoes, the drained lentils, the 100ml stock and 1 tsp mixed dried herbs. Stir, scraping the base to lift the brown bits. Sit the chicken back in with any juices and bring to a gentle bubble. Simmer for 6 minutes.", tip:"A gentle bubble, not a rolling boil. You want it to thicken just enough to coat the back of a spoon.", timer:360},
      {text:"Wilt the spinach. Add the 150g spinach a large handful at a time, stirring each handful in before adding the next. It will look like a lot but collapses quickly. Once all the spinach has wilted into the sauce, take the pan off the heat.", tip:"Frozen spinach can go in all at once — just break up any clumps as it heats through.", timer:120},
      {text:"Check the chicken is cooked through. Pick out the thickest thigh and cut into the middle with a knife. The meat should be white all the way through with no pink remaining and the juices should run clear, not pink. If it needs more time, put the pan back on a low heat for 2 more minutes and check again. Add a small pinch of salt, stir, and plate up.", tip:"Per serving: about 46g protein, 555 kcal.", timer:null},
    ]
  },
  {
    id:"orzo", title:"Prawn, courgette & tomato orzo",
    sub:"One pan, no draining. The orzo cooks in the stock and goes creamy as it absorbs it.",
    tag:"", tagLabel:"One pan",
    kcal:575, protein:44, carbs:58, fat:16, prep:"10 min", cook:"20 min", cost:"£2.90",
    note:"Reheats fine. Add a splash of water as you warm it through, since the orzo firms up and drinks the sauce in the fridge.",
    prepSteps:[
      "If the prawns are frozen, defrost them fully and pat them very dry with kitchen paper. Wet prawns won't take any colour and just stew.",
      "Halve 200g cherry tomatoes.",
      "Trim the ends off the courgette and dice it into roughly 1cm cubes.",
      "Peel and finely slice 3 garlic cloves.",
      "Zest half a lemon: rub it down the fine side of a grater, taking only the bright yellow skin and turning the lemon as soon as the white shows. The white pith underneath is bitter, so stop the moment you hit it. Keep the zested lemon half in the fridge — squeeze it over the greens on salmon night instead of going to waste.",
      "Grate 30g parmesan on the fine side of the grater.",
      "Dissolve 1 stock cube in 500ml just-boiled water."
    ],
    ingredients:[
      {n:"Raw king prawns, peeled", q:"320g"},
      {n:"Orzo (rice-shaped pasta)", q:"160g"},
      {n:"Courgette", q:"1"},
      {n:"Cherry tomatoes", q:"200g"},
      {n:"Garlic cloves", q:"3"},
      {n:"Lemon (zest only)", q:"½"},
      {n:"Parmesan", q:"30g"},
      {n:"Chicken or veg stock cube", q:"1"},
      {n:"Olive oil", q:"1 tbsp"},
      {n:"Salt", q:"pinch"}
    ],
    steps:[
      {text:"Sizzle the garlic. Heat 1 tbsp olive oil in a wide pan on medium for 1 minute. Add the sliced garlic and cook for 1 minute.", tip:"Keep it on medium. Garlic should turn pale gold and smell sweet and nutty. The moment it browns it turns bitter, so don't walk away.", timer:60},
      {text:"Soften the courgette. Add the diced courgette and a small pinch of salt. Cook, stirring now and then, for 4 minutes.", tip:"Ready when the edges are golden and a fork slides through a cube easily with no crunch left.", timer:240},
      {text:"Toast the orzo and add tomatoes. Tip in the 160g orzo and the halved tomatoes. Stir for 1 minute so every grain of orzo gets coated in the oil.", tip:"A quick toast gives the orzo a nuttier flavour and stops the grains clumping together later.", timer:60},
      {text:"Simmer the orzo. Pour in the 500ml hot stock and stir everything together. Bring to a gentle bubble and cook for about 9 minutes, stirring every couple of minutes to stop it sticking to the base. If it looks like it's drying out before it's cooked, add a small splash of hot water and keep going.", tip:"Done when the orzo is tender with the tiniest bite left and the liquid has reduced to a loose, creamy sauce that coats the back of a spoon.", timer:540},
      {text:"Cook the prawns through. Stir in the prawns and cook for about 3 minutes until every one has turned from grey-blue to pink and curled into a loose C-shape.", tip:"A loose C is perfect. A tight O-shape means overcooked and rubbery, so pull them off the heat the moment there's no grey left.", timer:180},
      {text:"Finish. Off the heat, stir through the lemon zest, 20g of the parmesan and a small pinch of salt. Plate up and scatter over the last 10g parmesan.", tip:"Per serving: about 44g protein, 575 kcal.", timer:null}
    ]
  },
  {
    id:"omelette", title:"Smoked salmon & greens omelette",
    sub:"A fast, high-protein lunch. Veg wilted through, salmon folded in at the end so it stays silky.",
    tag:"lunch", tagLabel:"Lunch · serves 1",
    kcal:330, protein:31, carbs:6, fat:20, prep:"5 min", cook:"8 min", cost:"£1.90",
    note:"Swap the smoked salmon for 60g leftover cooked chicken or 50g lean ham if you'd rather. All three keep the saturated fat lower than loading it with cheese.",
    prepSteps:[
      "Crack 3 eggs into a bowl. Add a small pinch of salt and a small pinch of black pepper, then beat with a fork for 20 seconds until the yolk and white are fully combined and slightly frothy. The froth cooks up lighter.",
      "Thinly slice 3 chestnut mushrooms.",
      "Halve 4 cherry tomatoes.",
      "Tear 50g smoked salmon into rough strips (or shred 60g cooked chicken)."
    ],
    ingredients:[
      {n:"Medium eggs", q:"3"},
      {n:"Smoked salmon (or cooked chicken/ham)", q:"50g"},
      {n:"Spinach, large handful", q:"50g"},
      {n:"Chestnut mushrooms", q:"3"},
      {n:"Cherry tomatoes", q:"4"},
      {n:"Olive oil", q:"1 tsp"},
      {n:"Salt", q:"pinch"},
      {n:"Black pepper", q:"pinch"}
    ],
    steps:[
      {text:"Cook the veg. Heat 1 tsp olive oil in a non-stick frying pan on medium for 1 minute. Add the sliced mushrooms and a small pinch of salt and cook for 2 minutes, stirring once or twice. Then add the spinach and cherry tomatoes and cook for 1 more minute until the spinach has fully wilted and collapsed.", tip:"Mushrooms are ready when they've shrunk, turned golden and released then reabsorbed their water. That's when they taste savoury rather than squeaky.", timer:180},
      {text:"Add the eggs. Pour the beaten eggs over the veg and tilt the pan so they spread into an even layer. Leave it without touching for 30 seconds.", tip:"Don't stir. Let the bottom set into a single sheet, that's what holds the omelette together.", timer:30},
      {text:"Pull and set the omelette. Using a spatula, push one edge of the egg into the middle of the pan, then tilt the pan slightly so the runny egg on top flows into the gap you just made. Move to the next edge and do the same thing — push in, tilt, let the runny egg flow in. Keep going around the pan like this for about 2 minutes until the top of the omelette looks just barely set, still a little glossy but not wet and sloshing.", tip:"Pull it off the heat while the top still looks slightly underdone. It carries on cooking from the heat of the pan once you plate it up, and an overcooked omelette goes rubbery and dry.", timer:120},
      {text:"Add salmon and fold. Scatter the smoked salmon over one half. Fold the empty half over it with the spatula and slide it onto a plate.", tip:"Per serving: about 31g protein, 330 kcal.", timer:null}
    ]
  }
];

const SHOP = {
  buy:[
    {n:"Salmon fillets, skin on", q:"2 (~130g each)", cost:4.00, for:"Salmon", note:""},
    {n:"Skinless boneless chicken thighs", q:"320g", cost:2.50, for:"Chicken pan", note:""},
    {n:"Raw king prawns, peeled", q:"320g", cost:3.50, for:"Orzo", note:""},
    {n:"Smoked salmon", q:"50g", cost:1.50, for:"Omelette lunch", note:""},
    {n:"Tinned green or puy lentils", q:"1 × 400g tin", cost:0.70, for:"Chicken pan", note:""},
    {n:"Tinned chopped tomatoes", q:"1 × 400g tin", cost:0.45, for:"Chicken pan", note:""},
    {n:"Broccoli or tenderstem", q:"160g", cost:0.85, for:"Salmon", note:""},
    {n:"Pak choi", q:"2 heads", cost:0.70, for:"Salmon", note:""},
    {n:"Courgette", q:"1 medium", cost:0.40, for:"Orzo", note:""},
    {n:"Cherry tomatoes", q:"200g punnet", cost:0.75, for:"Orzo + omelette", overlap:true, note:""},
    {n:"Brown or white onion", q:"1 medium", cost:0.15, for:"Chicken pan", note:""},
    {n:"Chestnut mushrooms", q:"1 pack (~200g)", cost:0.55, for:"Omelette lunch", note:""},
    {n:"Lemon (for zest)", q:"1", cost:0.30, for:"Orzo", note:""},
    {n:"Frozen edamame", q:"150g (from bag)", cost:1.50, for:"Salmon", note:"bag lasts a few weeks"},
    {n:"White miso paste", q:"1 small tub", cost:2.00, for:"Salmon", note:"tub lasts months"},
    {n:"Eggs", q:"box of 6", cost:1.30, for:"Omelette lunch", note:""},
    {n:"Orzo", q:"500g bag", cost:0.90, for:"Orzo", note:"bag lasts 2-3 meals"}
  ],
  pantry:[
    {n:"Basmati or jasmine rice", note:"a bag lasts a few meals"},
    {n:"Garlic", note:"used in all three dinners, one bulb covers it"},
    {n:"Parmesan", note:"a block lasts ~2 weeks at 30g a meal"},
    {n:"Sesame seeds & sesame oil", note:"store cupboard"},
    {n:"Soy sauce & honey", note:"store cupboard"},
    {n:"Olive oil & mixed dried herbs", note:"store cupboard"},
    {n:"Frozen spinach", note:"covers the chicken pan and the omelette"},
    {n:"Chicken stock cubes", note:"a box lasts weeks"},
    {n:"Salt & black pepper", note:"store cupboard"}
  ]
};
let shopChecked = new Set();
// pantryState: 0 = in stock, 1 = running low, 2 = need to buy
const pantryState = SHOP.pantry.map(() => 0);

let active = 0;
let view = "meals"; // "meals" | "shop"
let tab = "ing";
let cook = {}; // per recipe: {step, done:Set}

function initCook(){ cook = {}; RECIPES.forEach((r,i)=>cook[i]={step:0,done:new Set()}); }
initCook();

/* ---- top-level view ---- */
function render(){
  const wi=document.getElementById("wrap-inner");
  const topnav=`
    <div class="eyebrow">This week · cook once, eat twice<\/div>
    <div class="topnav">
      <button class="topbtn ${view==='meals'?'active':''}" onclick="setView('meals')">This week's meals<\/button>
      <button class="topbtn ${view==='shop'?'active':''}" onclick="setView('shop')">Shopping list<\/button>
    <\/div>`;
  if(view==='shop'){
    wi.innerHTML=topnav+`<div class="card"><div class="panel" style="padding-top:20px">${renderShop()}<\/div><\/div>`;
  } else {
    const selHTML=`<div class="selector">`+RECIPES.map((r,i)=>`
      <button class="mealbtn ${i===active?'active':''}" onclick="selectMeal(${i})">
        <div class="mtitle">${r.title}<\/div>
        <div class="mmeta">${r.protein}g protein · ${r.kcal} kcal<\/div>
        <div class="tagrow"><span class="pill ${r.tag}">${r.tagLabel}<\/span><\/div>
      <\/button>`).join("")+`<\/div>`;
    wi.innerHTML=topnav+selHTML+`<div class="card" id="card"><\/div>`;
    renderCard();
  }
}
function setView(v){ view=v; render(); window.scrollTo({top:0,behavior:"smooth"}); }
function selectMeal(i){ active=i; tab="ing"; render(); window.scrollTo({top:0,behavior:"smooth"}); }

/* ---- render card ---- */
function renderCard(){
  const r=RECIPES[active];
  const c=document.getElementById("card");
  if(!c) return;
  c.innerHTML=`
    <div class="head">
      <h1 class="title">${r.title}<\/h1>
      <p class="sub">${r.sub}<\/p>
      <div class="macros">
        <div class="macro hero"><b>${r.kcal}<\/b><span>kcal<\/span><\/div>
        <div class="macro hero"><b>${r.protein}g<\/b><span>protein<\/span><\/div>
        <div class="macro"><b>${r.carbs}g<\/b><span>carbs<\/span><\/div>
        <div class="macro"><b>${r.fat}g<\/b><span>fat<\/span><\/div>
      <\/div>
      <div class="meta"><span>Prep <b>${r.prep}<\/b><\/span><span>Cook <b>${r.cook}<\/b><\/span><span>Cost <b>${r.cost}<\/b>/serving<\/span><\/div>
      ${r.note?`<div class="note"><b>Heads up.<\/b> ${r.note}<\/div>`:""}
    <\/div>
    <div class="tabs">
      <button class="tab ${tab==='ing'?'active':''}" onclick="setTab('ing')">Ingredients<\/button>
      <button class="tab ${tab==='cook'?'active':''}" onclick="setTab('cook')">Cook mode<\/button>
    <\/div>
    <div class="panel">${tab==='ing'?renderIng(r):renderCook(r)}<\/div>`;
  if(tab==='cook') repaintTimers();
}
function setTab(t){ tab=t; render(); }

/* ---- ingredients ---- */
function renderIng(r){
  const tickSvg='<svg viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><\/svg>';
  return `
    <h2 class="sech">Before you start<\/h2>
    <ul class="prep">${r.prepSteps.map(p=>`<li>${p}<\/li>`).join("")}<\/ul>
    <h2 class="sech">Ingredients<\/h2>
    <ul class="ing" id="inglist">
      ${r.ingredients.map((it,i)=>`
        <li onclick="this.classList.toggle('checked')">
          <span class="box">${tickSvg}<\/span>
          <span class="iname">${it.n}<\/span>
          <span class="iqty">${it.q}<\/span>
        <\/li>`).join("")}
    <\/ul>`;
}

/* ---- cook mode ---- */
function renderCook(r){
  const st=cook[active];
  const total=r.steps.length;
  if(st.step>=total) return renderFinish();
  const pct=Math.round((st.done.size/total)*100);
  let html=`
    <div class="progwrap">
      <div class="progmeta"><span>Step ${st.step+1} of ${total}<\/span><span>${st.done.size}/${total} done<\/span><\/div>
      <div class="progbar"><div class="progfill" style="width:${pct}%"><\/div><\/div>
    <\/div>`;
  const isLastStep=(st.step===total-1);
  r.steps.forEach((s,i)=>{
    const isDone=st.done.has(i), isActive=i===st.step, isFuture=i>st.step;
    const cls=isDone?"done":(isActive?"active":(isFuture?"future":""));
    html+=`<div class="step ${cls}">`;
    if(s.parallel){
      html+=`
        <div class="stephd">
          <span class="stepnum">${i+1}<\/span>
          <span class="steptag">${isDone?'Done':'Two pans at once'}<\/span>
          ${isDone?'<span class="donetick">✓ Done<\/span>':''}
        <\/div>`;
      if(isActive){
        html+=`
          <div class="par-banner">Two pans running at the same time — start both together.<\/div>
          <div class="par-grid">
            <div class="par-col main">
              <div class="par-label">Main pan<\/div>
              <div class="par-text">${s.parallel.main.text}<\/div>
            <\/div>
            <div class="par-col side">
              <div class="par-label">At the same time<\/div>
              <div class="par-text">${s.parallel.side.text}<\/div>
            <\/div>
          <\/div>
          <div class="tip">${tipIcon()}<span>${s.parallel.main.tip} ${s.parallel.side.tip}<\/span><\/div>
          <div class="nav">
            <button class="nbtn back" onclick="prevStep()" ${st.step===0?'disabled':''}>Back<\/button>
            <button class="nbtn next" onclick="nextStep()">${isLastStep?'Finish':'Next step'}<\/button>
          <\/div>`;
      }
    } else {
      html+=`
        <div class="stephd">
          <span class="stepnum">${i+1}<\/span>
          <span class="steptag">${isDone?'Done':(isActive?'Now':'Up next')}<\/span>
          ${isDone?'<span class="donetick">✓ Done<\/span>':''}
        <\/div>
        <div class="steptext">${s.text}<\/div>`;
      if(isActive){
        if(s.tip) html+=`<div class="tip">${tipIcon()}<span>${s.tip}<\/span><\/div>`;
        html+=`
          <div class="nav">
            <button class="nbtn back" onclick="prevStep()" ${st.step===0?'disabled':''}>Back<\/button>
            <button class="nbtn next" onclick="nextStep()">${isLastStep?'Finish':'Next step'}<\/button>
          <\/div>`;
      }
    }
    html+=`<\/div>`;
  });
  return html;
}
function tipIcon(){ return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M9 18h6M10 21h4M12 3a6 6 0 00-4 10.5c.6.6 1 1.3 1 2.5h6c0-1.2.4-1.9 1-2.5A6 6 0 0012 3z" stroke="#b07c1a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><\/svg>'; }

function nextStep(){
  const r=RECIPES[active], st=cook[active];
  st.done.add(st.step);
  st.step++;
  render();
}
function prevStep(){
  const st=cook[active];
  if(st.step>0){ st.step--; st.done.delete(st.step); render(); }
}
function renderFinish(){
  return `
    <div class="finish">
      <div class="big">🍽️<\/div>
      <h3>That's dinner done.<\/h3>
      <p>Plate one up tonight, box the other for tomorrow.<\/p>
      <button onclick="restart()">Start again<\/button>
    <\/div>`;
}
function restart(){
  cook[active]={step:0,done:new Set()};
  render();
}

/* ---- shopping list ---- */
function shopTotals(){
  let total=0, remaining=0;
  SHOP.buy.forEach((it,i)=>{ total+=it.cost; if(!shopChecked.has(i)) remaining+=it.cost; });
  SHOP.pantry.forEach((it,i)=>{ if(pantryState[i]===2 && it.cost){ total+=it.cost; remaining+=it.cost; } });
  return {total, remaining};
}
function toggleBuy(i){ shopChecked.has(i)?shopChecked.delete(i):shopChecked.add(i); render(); }
function cyclePantryTo(i,s){ pantryState[i]=s; render(); }
function renderShop(){
  const {total,remaining}=shopTotals();
  const tickSvg='<svg viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><\/svg>';
  let html=`
    <div class="shop-top">
      <div>
        <div class="shop-total">£${remaining.toFixed(2)}<\/div>
        <div class="shop-sub">left to buy · £${total.toFixed(2)} total<\/div>
      <\/div>
      <div class="shop-beat">vs Gousto<br><b>≈ £35<\/b><\/div>
    <\/div>
    <h2 class="sech">The shop · 3 dinners + 1 lunch<\/h2>
    <ul class="ing">`;
  SHOP.buy.forEach((it,i)=>{
    const ck=shopChecked.has(i);
    const sub=it.for+(it.note?' · '+it.note:'');
    html+=`
      <li class="${ck?'checked':''}" onclick="toggleBuy(${i})">
        <span class="box">${tickSvg}<\/span>
        <span class="iname">${it.n}${it.overlap?' <span class="ov">shared<\/span>':''}<span class="ifor">${sub}<\/span><\/span>
        <span class="iqty"><b>${it.q}<\/b><br>£${it.cost.toFixed(2)}<\/span>
      <\/li>`;
  });
  html+=`<\/ul>
    <h2 class="sech" style="margin-top:24px">Cupboard staples<\/h2>
    <p class="shop-note">Set the stock level for each. <b style="color:#c0392b">Buy<\/b> adds it to your total above.<\/p>
    <ul class="pantry">`;
  SHOP.pantry.forEach((it,i)=>{
    const s=pantryState[i];
    html+=`
      <li class="${s===2?'needs-buy':''}">
        <span class="pname">${it.n}<span class="pnote">${it.note}<\/span><\/span>
        <span class="pstock">
          <button class="${s===0?'active-in':''}" onclick="cyclePantryTo(${i},0)">In stock<\/button>
          <button class="${s===1?'active-low':''}" onclick="cyclePantryTo(${i},1)">Low<\/button>
          <button class="${s===2?'active-buy':''}" onclick="cyclePantryTo(${i},2)">Buy<\/button>
        <\/span>
      <\/li>`;
  });
  html+=`<\/ul>`;
  return html;
}

document.addEventListener("DOMContentLoaded", render);
</script>
</body>
</html>
